# node-ops-daemon example configuration
# Copy to ~/.node-ops/config.toml and adjust values.

[limits]
# Maximum satoshis the daemon may rebalance per UTC calendar day.
daily_rebalance_budget_sat = 1_000_000

# Largest single fee change (absolute value, in ppm) that can be auto-executed.
max_fee_ppm_delta = 100

# Minimum time between successive operations on the same channel (Go duration string).
per_channel_cooldown = "1h"

# Fee rate ceiling (ppm) accepted for rebalance routes.
rebalance_max_fee_ppm = 500

[approval]
# Changes with |delta_ppm| <= this value are auto-executed (when require_approval = false).
auto_execute_below_ppm_delta = 20

# When true, every action is queued for human review regardless of size.
require_approval = true

[storage]
# Path to the append-only SQLite audit ledger.
ledger = "~/.node-ops/ledger.db"

# Path to the persisted limits engine state.
limits_state = "~/.node-ops/limits-state.json"

# Creating this file halts all daemon execution immediately.
killswitch = "~/.node-ops/STOP"

[node]
# LND gRPC endpoint controlled by the daemon. The first gated write path is
# regtest-only; mainnet is intentionally rejected.
lnd_rpc = "127.0.0.1:10009"
required_network = "regtest"

# Scoped node-ops macaroon. Do not point this at admin.macaroon.
macaroon = "~/.node-ops/node-ops.macaroon"
tls_cert = "~/.lnd/tls.cert"

# Bound startup dials and per-RPC calls.
dial_timeout = "5s"
request_timeout = "10s"

[operator]
# Separate human/operator-only socket for approve/deny actions. This is not
# exposed through the model-callable MCP server.
approval_socket = "~/.node-ops/operator.sock"

[monitor]
# Start a background read-only node_health poller when the daemon starts.
# Requires a concrete node_health reader; the fail-closed stub rejects startup
# if monitoring is enabled without one.
enabled = false

# How often to poll node_health for force-close, health, and peer alerts.
poll_interval = "30s"

# Suppress duplicate pushes for the same alert during this window.
alert_cooldown = "10m"

# Where to push alerts. Supported values: "file" or "stdout".
alert_channel = "file"

# JSONL alert destination used when alert_channel = "file".
alert_path = "~/.node-ops/alerts.jsonl"
